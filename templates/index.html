<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Diabetes Prediction</title>
</head>

<body>
    <div class="container">
        <h2 class="container-heading">
            <span class="heading_font">Diabetes Prediction</span>
        </h2>
    </div>

    <div class="ml-container">
        <!-- FIXED FORM -->
        <form action="/predict" method="post">

            <h3>Pregnancies</h3>
            <input name="Pregnancies" placeholder="Number of Pregnancies" required>

            <h3>Glucose</h3>
            <input name="Glucose" placeholder="Glucose" required>

            <h3>Blood Pressure</h3>
            <input name="BloodPressure" placeholder="(mm Hg)" required>

            <h3>Skin Thickness</h3>
            <input name="SkinThickness" placeholder="(mm)" required>

            <h3>Insulin</h3>
            <input name="Insulin" placeholder="(mu U/ml)" required>

            <h3>Body Mass Index</h3>
            <input name="BMI" placeholder="BMI" required>

            <h3>Diabetes Pedigree Function</h3>
            <input name="DiabetesPedigreeFunction" placeholder="DPF" required>

            <h3>Age</h3>
            <input name="Age" placeholder="Age in years" required>

            <br><br>
            <button id="sub" type="submit">Submit</button>

        </form>
    </div>

    <style>
        body {
            background-image: url("https://mk0mydrtest3eri40dsq.kinstacdn.com/wp-content/uploads/2019/01/AdobeStock_331018077-scaled-1210x700.jpg");
            background-position: center;
            background-size: cover;
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
        }

        input {
            border-radius: 10px;
            height: 30px;
            font-size: 16px;
            text-align: center;
            margin-bottom: 10px;
        }

        #sub {
            width: 120px;
            height: 40px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        .heading_font {
            font-size: 40px;
            color: black;
        }
    </style>

</body>
</html>
