<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Result</title>
</head>

<body>

<div class="container">

    <h1>Diabetes Prediction Result</h1>

    {% if prediction_text == "Diabetic" %}
        <h2 class="danger">Oops! You have DIABETES.</h2>
        <img src="{{ url_for('static', filename='diabetes.webp') }}">
    {% else %}
        <h2 class="success">Congratulations! You DON'T have diabetes.</h2>
        <img src="{{ url_for('static', filename='no-diabetes.webp') }}">
    {% endif %}

    <a href="/">Go Back</a>

</div>

</body>
</html>
